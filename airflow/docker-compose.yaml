services:
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-webserver:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../src:/opt/airflow/src
      - ../config:/opt/airflow/config
      - ../data:/opt/airflow/data
      - ../scripts:/opt/airflow/scripts
      - ../gx_workspace:/opt/airflow/gx_workspace
      - ../.env:/opt/airflow/.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64
      - JAVA_TOOL_OPTIONS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/config/keys_gcp/finance-ml-project-486410-f5aa9a641051.json
    restart: always

  airflow-scheduler:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ../src:/opt/airflow/src
      - ../config:/opt/airflow/config
      - ../data:/opt/airflow/data
      - ../scripts:/opt/airflow/scripts
      - ../gx_workspace:/opt/airflow/gx_workspace
      - ../.env:/opt/airflow/.env
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-arm64
      - JAVA_TOOL_OPTIONS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/config/keys_gcp/finance-ml-project-486410-f5aa9a641051.json
    restart: always

  airflow-init:
    build:
      context: ..
      dockerfile: airflow/Dockerfile
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
    depends_on:
      - postgres
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init &&
        airflow users create \
          --username admin \
          --firstname admin \
          --lastname admin \
          --role Admin \
          --email admin@admin.com \
          --password admin
