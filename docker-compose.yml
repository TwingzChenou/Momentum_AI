services:
  momentum-app:
    build: .
    container_name: momentum-ai-dashboard
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # On force JAVA_HOME pour Docker, écrasant celui du .env local
      - JAVA_HOME=/usr/lib/jvm/java-21-openjdk-arm64
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
      - JAVA_TOOL_OPTIONS=--add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=jdk.management/com.sun.management.internal=ALL-UNNAMED
    # Relancer automatiquement si crash
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
